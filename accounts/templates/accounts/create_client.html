<!DOCTYPE html>
<html>
<head>
    <title>Create Client</title>
</head>
<body>

<h2>Create New Client (Company)</h2>

<form method="POST">
    {% csrf_token %}

    <label>Company Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Domain:</label><br>
    <input type="text" name="domain" placeholder="example.com" required><br><br>

    <label>Schema Name:</label><br>
    <input type="text" name="schema" required><br><br>

    <button type="submit">Create Client</button>
</form>

</body>
</html>

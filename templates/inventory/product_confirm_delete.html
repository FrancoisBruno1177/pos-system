<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Product</title>
    <style>
        body { margin:0; font-family:Inter,Arial,sans-serif; background:linear-gradient(135deg,#0b1220,#111827,#1e293b); color:#e5e7eb; display:grid; place-items:center; min-height:100vh; padding:20px; }
        .card { width:100%; max-width:560px; background:rgba(255,255,255,0.08); border-radius:20px; padding:24px; }
        h1 { margin-top:0; }
        p { color:#94a3b8; line-height:1.7; }
        .actions { display:flex; gap:12px; margin-top:20px; }
        .btn, button {
            flex:1;
            padding:12px 16px;
            border-radius:12px;
            border:none;
            cursor:pointer;
            text-decoration:none;
            color:white;
            text-align:center;
        }
        .btn-secondary { background:rgba(255,255,255,0.08); }
        .btn-danger { background:#dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Delete Product</h1>
        <p>Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn-danger">Delete</button>
            </div>
        </form>
    </div>
</body>
</html>

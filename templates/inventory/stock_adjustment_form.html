<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adjust Stock | POSIFY</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            color: #eef2ff;
            background: linear-gradient(135deg, #071225, #0f172a, #13233f);
        }
        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px;
        }
        .card {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 24px;
            padding: 24px;
        }
        h1 { margin-top: 0; }
        .meta {
            margin-bottom: 18px;
            color: #9aa8c7;
        }
        form {
            display: grid;
            gap: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }
        input, select, textarea {
            width: 100%;
            background: rgba(15,23,42,.76);
            color: white;
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 14px;
            padding: 12px 14px;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .errorlist {
            color: #fecaca;
            list-style: none;
            padding: 0;
            margin: 8px 0 0;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            text-decoration: none;
            color: white;
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.10);
            font-weight: 800;
        }
        button {
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            background: #2563eb;
            color: white;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Adjust Stock</h1>
            <div class="meta">
                Product: <strong>{{ product.name }}</strong><br>
                Current Quantity: <strong>{{ product.quantity }}</strong><br>
                SKU: <strong>{{ product.sku }}</strong>
            </div>

            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="errorlist">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="actions">
                    <a href="{% url 'product_detail' product.id %}" class="btn">Cancel</a>
                    <button type="submit">Save Adjustment</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

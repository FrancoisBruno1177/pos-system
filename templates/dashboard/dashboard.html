{% extends "base.html" %}

{% block content %}

<h1>POSIFY Dashboard</h1>

<div class="dashboard-grid">

<div class="stat-card">

<h3>Total Sales</h3>

<h2 id="live-total">$0</h2>

</div>

</div>

<script>

const socket=new WebSocket(

"ws://"+window.location.host+"/ws/dashboard/"

)

socket.onmessage=function(e){

const data=JSON.parse(e.data)

document.getElementById(

"live-total"

).innerText=data.total

}

</script>

{% endblock %}

{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>POSIFY - Reset Password</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">  

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f0f1a, #050508);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        /* Animated glowing background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #00f0ff, #8a2eff, #00f0ff);
            animation: rotate 10s linear infinite;
            opacity: 0.15;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Card */
        .auth-box {
            position: relative;
            background: rgba(10,10,20,0.9);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px #00f0ff;
        }

        /* Title */
        .logo {
            font-size: 30px;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #aaa;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            outline: none;
            border-radius: 8px;
            background: #111;
            color: white;
            box-shadow: 0 0 5px #00f0ff;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00f0ff, #8a2eff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #00f0ff;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Messages */
        .messages p {
            color: #ff4d4d;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<div class="auth-box">
    <div class="logo">POSIFY</div>
    <div class="subtitle">Enter your email to reset your password</div>

    {% if messages %}
        <div class="messages">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset Password</button>
    </form>
</div>

</body>
</html>

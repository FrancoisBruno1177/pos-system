{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>POSIFY - Password Reset Complete</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">  

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f0f1a, #050508);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #00f0ff, #8a2eff, #00f0ff);
            animation: rotate 10s linear infinite;
            opacity: 0.15;
        }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .auth-box {
            position: relative;
            background: rgba(10,10,20,0.9);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px #00f0ff;
        }

        .logo { font-size: 30px; font-weight: bold; color: #00f0ff; text-shadow: 0 0 10px #00f0ff; margin-bottom: 10px; }
        .subtitle { font-size: 14px; margin-bottom: 20px; color: #aaa; }
        a { color: #00f0ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>

<body>
<div class="auth-box">
    <div class="logo">POSIFY</div>
    <div class="subtitle">Password Reset Complete</div>

    <p>Your password has been reset successfully.</p>
    <p><a href="{% url 'login' %}">Go back to login</a></p>
</div>
</body>
</html>
